<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAVIZ — Reverse (Word → Number)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e8e8f0; font-family:'Segoe UI',sans-serif; min-height:100vh; padding:16px; }
h1 { font-family:monospace; font-size:1.5rem; color:#00f5c4; text-align:center; margin-bottom:4px; letter-spacing:4px; }
.sub { text-align:center; color:#ffd700; font-size:0.75rem; letter-spacing:2px; margin-bottom:20px; }
.card { background:#12121a; border:1px solid #ff69b4; border-radius:16px; padding:16px; margin-bottom:14px; }
.label { font-size:0.65rem; color:#00f5c4; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; display:block; }
.lang-row { display:flex; gap:8px; margin-bottom:12px; }
.lang-btn { flex:1; padding:10px; border:1px solid #ff69b4; border-radius:10px; background:#1a1a28; color:#e8e8f0; font-size:0.75rem; font-weight:700; cursor:pointer; }
.lang-btn.active { background:linear-gradient(135deg,#7b2fff,#00f5c4); color:#000; border:none; }
input { width:100%; background:#0a0a0f; border:2px solid #ff69b4; border-radius:10px; padding:14px; font-size:1.4rem; color:#00f5c4; text-align:center; outline:none; margin-bottom:10px; letter-spacing:2px; }
.find-btn { width:100%; background:linear-gradient(135deg,#7b2fff,#00f5c4); border:none; border-radius:10px; padding:16px; color:#000; font-size:0.85rem; font-weight:900; letter-spacing:3px; cursor:pointer; }
.result { background:#1a1a28; border:1px solid #7b2fff; border-radius:12px; padding:16px; text-align:center; margin-top:14px; display:none; }
.word-disp { font-family:monospace; font-size:1.2rem; color:#00f5c4; letter-spacing:3px; margin-bottom:6px; word-break:break-all; }
.num-disp { font-family:monospace; font-size:3rem; font-weight:900; color:#7b2fff; letter-spacing:8px; margin:10px 0; }
.breakdown { font-size:0.85rem; color:#aaa; line-height:2; white-space:pre-line; text-align:left; background:#0a0a0f; border-radius:8px; padding:10px; margin-top:8px; }
.share-btn { width:100%; margin-top:10px; background:#25D366; border:none; border-radius:10px; padding:12px; color:#fff; font-size:0.75rem; font-weight:900; cursor:pointer; }
.back-btn { display:block; text-align:center; margin-bottom:16px; color:#00f5c4; font-size:0.8rem; text-decoration:none; letter-spacing:2px; }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← BACK TO KAVIZ</a>
<h1>🔄 KAVIZ</h1>
<div class="sub">WORD / SENTENCE → NUMBER</div>

<div class="card">
  <span class="label">Select Language</span>
  <div class="lang-row">
    <button class="lang-btn active" id="btnTA" onclick="setLang('ta')">🇮🇳 தமிழ்</button>
    <button class="lang-btn" id="btnHI" onclick="setLang('hi')">🇮🇳 हिंदी</button>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">🇬🇧 English</button>
  </div>
  <input type="text" id="wordInput" placeholder="தமிழ் வார்த்தை உள்ளிடவும்...">
  <button class="find-btn" onclick="findNumber()">🔢 FIND NUMBER</button>
</div>

<div class="result" id="resultBox">
  <div class="word-disp" id="wordDisp"></div>
  <div style="color:#aaa;font-size:1.2rem;">↓</div>
  <div class="num-disp" id="numDisp"></div>
  <div class="breakdown" id="breakdownDisp"></div>
  <button class="share-btn" onclick="shareWA()">📱 SHARE ON WHATSAPP</button>
</div>

<script>
var lang = 'ta';

function setLang(l) {
  lang = l;
  ['ta','hi','en'].forEach(function(x){
    var b = document.getElementById('btn'+x.charAt(0).toUpperCase()+x.slice(1));
    if(b) { b.className = 'lang-btn' + (x===l?' active':''); }
  });
  var inp = document.getElementById('wordInput');
  if(l==='ta') inp.placeholder = 'தமிழ் வார்த்தை உள்ளிடவும்...';
  else if(l==='hi') inp.placeholder = 'हिंदी शब्द दर्ज करें...';
  else inp.placeholder = 'Type English word or sentence...';
  inp.value = '';
  document.getElementById('resultBox').style.display = 'none';
}

function findNumber() {
  var raw = document.getElementById('wordInput').value.trim();
  if(!raw) { alert('Please enter a word!'); return; }

  var number = '';
  var breakdown = '';

  if(lang === 'ta') {
    var tmap = {
      'க':1,'ங':1,'ச':2,'ஞ':2,'ட':3,'ந':3,'த':4,'ய':4,
      'ப':5,'ஜ':5,'ஷ':5,'ஸ':5,'ஹ':5,'ம':6,'ர':7,'ற':7,
      'வ':8,'ழ':8,'ல':9,'ள':9,'ண':0,'ன':0,
      'அ':0,'இ':0,'உ':0,'எ':0,'ஒ':0,
      'ஆ':9,'ஈ':9,'ஊ':9,'ஏ':9,'ஓ':9,'ஐ':9,'ஔ':9
    };
    var chars = Array.from(raw.replace(/\s/g,''));
    for(var i=0;i<chars.length;i++){
      var c = chars[i];
      var code = c.codePointAt(0);
      if(code===0x0BCD){ breakdown += c + ' (pulli - skip)\n'; continue; }
      if(code>=0x0BBE && code<=0x0BCC){ breakdown += c + ' (uyir mey - skip)\n'; continue; }
      if(tmap.hasOwnProperty(c)){ number += tmap[c]; breakdown += c + ' → ' + tmap[c] + '\n'; }
    }

  } else if(lang === 'en') {
    var pmap = {X:0,Y:0,Z:0,B:1,C:1,D:2,F:2,G:3,H:3,J:4,K:4,L:5,M:5,N:6,P:6,Q:7,R:7,S:8,T:8,V:9,W:9};
    var vowels = new Set(['A','E','I','O','U']);
    var stream = raw.toUpperCase().replace(/[^A-Z]/g,'').split('');
    var i = 0;
    while(i < stream.length){
      var a = stream[i];
      var b = i+1 < stream.length ? stream[i+1] : null;
      var aV = vowels.has(a);
      var bV = !b || vowels.has(b);
      if(aV && bV){ breakdown += (b?a+b:a) + ' → SKIP\n'; i += b?2:1; }
      else if(aV && !bV){ number += pmap[b]; breakdown += a+b + ' → ' + pmap[b] + ' (E3)\n'; i+=2; }
      else if(!aV && bV){ number += pmap[a]; breakdown += a+(b||'') + ' → ' + pmap[a] + ' (E1)\n'; i+=2; }
      else { number += pmap[a]; breakdown += a+b + ' → ' + pmap[a] + ' (E2)\n'; i+=2; }
    }

  } else {
    alert('Hindi encoding coming soon!');
    return;
  }

  document.getElementById('wordDisp').textContent = raw;
  document.getElementById('numDisp').textContent = number || '?';
  document.getElementById('breakdownDisp').textContent = breakdown;
  document.getElementById('resultBox').style.display = 'block';
}

function shareWA() {
  var word = document.getElementById('wordDisp').textContent;
  var num = document.getElementById('numDisp').textContent;
  var msg = encodeURIComponent('🧠 KAVIZ\n\n' + word + ' → ' + num + '\n\n490 = KAVIZ 🎯\nkkchandru062228-wq.github.io');
  window.open('https://wa.me/?text='+msg,'_blank');
}

document.getElementById('wordInput').addEventListener('keypress', function(e){
  if(e.key==='Enter') findNumber();
});
</script>
</body>
</html>
